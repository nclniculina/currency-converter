<!DOCTYPE html>
<html lang="deu">
<head>
<meta charset="UTF-8">
<title>Währungsrechner</title>
<link rel="stylesheet" href="style.css">
</head>


<body>
<!-- Hauptüberschrift -->
<h1>Währungsrechner</h1>

<!-- Container für den Währungsrechner -->
<div class="converter">
  <!-- Eingabefeld für Betrag -->
  <input type="number" id="amount" placeholder="Betrag" />

<!-- Auswahl der Ausgangswährung -->
<select id="fromCurrency">
 <option value="USD">USD</option>
 <option value="EUR">EUR</option>
 <option value="RUB">RUB</option>
</select>

<!-- Auswahl der Zielwährung -->
<select id="toCurrency">
 <option value="USD">USD</option>
 <option value="EUR">EUR</option>
 <option value="RUB">RUB</option>
</select>

<!-- Button zum Konvertieren -->
<button id="convertBtn">Konvertieren</button>
</div>

<!-- Anzeige des Ergebnisses -->
<p id="result"></p>

<div class="footer-decor">
<div class="line"></div>
<div class="coins">
<div class="coin"></div>
<div class="coin"></div>
<div class="coin"></div>
</div>
</div>

<!-- Einbindung des JavaScript-Codes -->
<script src="script.js"></script>
</body>
</html>
